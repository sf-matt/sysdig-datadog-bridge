apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: sysdig-datadog-bridge
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File /fluent-bit/etc/parsers.conf

    [INPUT]
        Name              tail
        Path              /logs/events.log
        Tag               sysdig.webhook
        Parser            json
        Read_from_Head    false
        Refresh_Interval  2
        Rotate_Wait       30
        DB                /tmp/fluentbit-tail.db

    [OUTPUT]
        Name              datadog
        Match             sysdig.webhook
        Host              ${DD_LOG_HOST}
        TLS               On
        compress          gzip
        apikey            ${DD_API_KEY}
        dd_service        sysdig-webhook-bridge
        dd_source         sysdig
        dd_tags           integration:sysdig,bridge:sysdig-datadog

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json